name: Deploy Admin

# CD panel admin (target hosting "admin"). Hanya butuh 1 secret: FIREBASE_TOKEN.
# Config Firebase web di-hardcode di bawah — nilai PUBLIK (keamanan via Firestore
# rules, bukan kerahasiaan apiKey). Skip mulus bila token belum di-set.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & deploy admin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cek FIREBASE_TOKEN
        id: token
        run: echo "present=${{ secrets.FIREBASE_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        if: steps.token.outputs.present == 'true'
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        if: steps.token.outputs.present == 'true'
        run: npm ci

      - name: Build (static export)
        if: steps.token.outputs.present == 'true'
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyD8_xQ095GsDSOr_nhONflsPa0qtMnWfkY
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: admin-absensi-jne-mtp.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: admin-absensi-jne-mtp
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: admin-absensi-jne-mtp.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '586449872388'
          NEXT_PUBLIC_FIREBASE_APP_ID: '1:586449872388:web:e72ef8330d71be35ce3751'
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: G-19LD1SX6W3
        run: npm run build

      - name: Deploy ke Firebase Hosting (target admin)
        if: steps.token.outputs.present == 'true'
        run: >-
          npx firebase-tools deploy --only hosting:admin
          --project admin-absensi-jne-mtp --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Token belum di-set
        if: steps.token.outputs.present != 'true'
        run: echo "::warning::FIREBASE_TOKEN belum di-set — auto-deploy admin dilewati. Tambahkan secret FIREBASE_TOKEN untuk mengaktifkan."
