name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web · prettier + eslint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Prettier check
        run: npm run format:check
      - name: ESLint
        run: npm run lint
      - name: Build (static export)
        # Firebase web config bersifat publik (sudah ter-embed di bundle live);
        # CI cukup nilai non-kosong agar getAuth tidak throw saat prerender.
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-build-placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-build.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-build
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-build.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          NEXT_PUBLIC_FIREBASE_APP_ID: '1:000000000000:web:0000000000000000000000'
        run: npm run build

  functions:
    name: Functions · tsc build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci
      - name: Build
        run: npm run build
